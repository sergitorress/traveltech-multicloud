# Fly.io configuration for Comments Service
app = "traveltech-comments"

[build]
  builder = "heroku"

[[services]]
  http_checks = []
  internal_port = 3003
  protocol = "tcp"
  script_checks = []
  
  [services.concurrency]
    hard_limit = 25
    soft_limit = 20
    type = "connections"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

[env]
  NODE_ENV = "production"
  PORT = "3003"
